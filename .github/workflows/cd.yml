name: Continuous Delivery
on:
  push:
    branches:
      - prod

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner name
        id: owner
        run: echo "name=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ steps.owner.outputs.name }}/user-service:latest \
            -t ghcr.io/${{ steps.owner.outputs.name }}/user-service:${{ github.sha }} .

      - name: Push Docker Image to registry
        run: |
          docker push ghcr.io/${{ steps.owner.outputs.name }}/user-service:latest
          docker push ghcr.io/${{ steps.owner.outputs.name }}/user-service:${{ github.sha }}








